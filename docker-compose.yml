version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://db:27017/
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      - db
      - ml-service

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
